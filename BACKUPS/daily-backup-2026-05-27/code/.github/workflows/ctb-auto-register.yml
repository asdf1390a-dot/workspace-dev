name: CTB Auto-Register on Design Complete

on:
  push:
    paths:
      - 'project_*.md'
  workflow_dispatch:

jobs:
  detect-design-complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Detect design complete marker
        id: detect
        run: |
          # Find all project_*.md files modified in this push
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            FILES=$(git diff HEAD~1 HEAD --name-only | grep "^project_.*\.md$" || echo "")
          else
            FILES=$(git diff ${{ github.event.before }} ${{ github.event.after }} --name-only | grep "^project_.*\.md$" || echo "")
          fi

          if [ -z "$FILES" ]; then
            echo "No project files changed"
            exit 0
          fi

          for FILE in $FILES; do
            if [ -f "$FILE" ]; then
              if grep -q "^status: .*\(설계 완료\|Design Complete\)" "$FILE"; then
                PROJECT_NAME=$(grep "^name:" "$FILE" | head -1 | sed 's/^name: //')
                echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
                echo "file=$FILE" >> $GITHUB_OUTPUT
                echo "found=true" >> $GITHUB_OUTPUT
              fi
            fi
          done

      - name: Update MEMORY.md (auto index)
        if: steps.detect.outputs.found == 'true'
        run: |
          PROJECT="${{ steps.detect.outputs.project_name }}"
          FILE="${{ steps.detect.outputs.file }}"
          DATE=$(date +%Y-%m-%d)

          # Check if already in MEMORY.md
          if ! grep -q "\[$PROJECT\]" MEMORY.md; then
            echo "- [$PROJECT]($FILE) — 설계 완료 $DATE, 웹개발자 개발 대기" >> MEMORY.md
            echo "MEMORY_UPDATED=true" >> $GITHUB_ENV
          fi

      - name: Commit MEMORY.md changes
        if: env.MEMORY_UPDATED == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add MEMORY.md
          git commit -m "chore: auto-register design complete for CTB"
          git push

      - name: Send Slack notification
        if: steps.detect.outputs.found == 'true'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "channel": "#일반",
              "text": "[Planner] 신규 설계 완료: ${{ steps.detect.outputs.project_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🔴 *설계 완료 신호*\n\n프로젝트: *${{ steps.detect.outputs.project_name }}*\n파일: `${{ steps.detect.outputs.file }}`\n상태: 웹개발자 개발 대기"
                  }
                }
              ]
            }

      - name: Send Telegram notification
        if: steps.detect.outputs.found == 'true'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🔴 설계 완료: ${{ steps.detect.outputs.project_name }}
            파일: ${{ steps.detect.outputs.file }}
            상태: 웹개발자 개발 대기 ✅
