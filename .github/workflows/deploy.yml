name: Deploy to Vercel (Standard Template)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './dsc-fms-portal/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./dsc-fms-portal

      - name: Run tests
        run: npm run test
        continue-on-error: true
        working-directory: ./dsc-fms-portal

      - name: Build project
        run: npm run build
        working-directory: ./dsc-fms-portal
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Check build success
        if: failure()
        run: |
          echo "❌ Build failed — stopping deployment"
          exit 1

  deploy-preview:
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel Preview
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          scope: asdf1390a
          working-directory: ./
          alias: pr-${{ github.event.pull_request.number }}

      - name: Post Preview URL to PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Preview Deployment Ready**\nhttps://pr-' + context.issue.number + '-dsc-fms-portal.vercel.app'
            })

  validate-migrations:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run migration safety validator (H3)
        run: |
          if [ -d "supabase/migrations" ] && [ "$(find supabase/migrations -type f -name '*.sql' | wc -l)" -gt 0 ]; then
            node crons/check-migration-safety.js
          else
            echo "ℹ️  No migrations to validate"
          fi
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: false

      - name: Validate H3 safety report
        run: |
          if [ -f "memory/MIGRATION_SAFETY_REPORT.md" ]; then
            if grep -q "UNSAFE\|FAILED" memory/MIGRATION_SAFETY_REPORT.md; then
              echo "❌ Unsafe migrations detected — blocking production deployment"
              exit 1
            fi
          fi

  deploy-production:
    needs: [build-and-test, validate-migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel Production
        uses: vercel/action@v4
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ env.VERCEL_ORG_ID }}
          vercel-project-id: ${{ env.VERCEL_PROJECT_ID }}
          scope: asdf1390a
          working-directory: ./
          prod: true

      - name: Log deployment status
        run: |
          echo "✅ Production Deployment Complete"
          echo "Commit: ${{ github.sha }}" | head -c 7
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  notify:
    needs: build-and-test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Notify deployment status (Discord/Telegram)
        run: |
          STATUS="${{ job.status }}"
          COMMIT_SHA="${{ github.sha }}"
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi

          echo "$EMOJI Deploy: $STATUS | Commit: ${COMMIT_SHA:0:7} | Time: $TIMESTAMP"
