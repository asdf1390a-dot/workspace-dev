name: P2 Vercel 자동 복구 (캐시 무효화 + 재배포)

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분 주기 자동 복구 시도
  workflow_dispatch:

jobs:
  auto-recovery:
    runs-on: ubuntu-latest
    name: Vercel 자동 복구 시도

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Vercel 배포 상태 확인
        id: verify
        run: |
          endpoints=(
            "https://dsc-fms-portal-audit.vercel.app"
            "https://dsc-fms-portal-discord.vercel.app"
            "https://dsc-fms-portal-bm.vercel.app"
            "https://dsc-fms-portal-travel.vercel.app"
          )

          healthy=0
          down=0

          for endpoint in "${endpoints[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" --max-time 10 2>/dev/null || echo "000")
            if [[ "$code" == "200" ]]; then
              ((healthy++))
            else
              ((down++))
            fi
          done

          echo "HEALTHY_COUNT=$healthy" >> $GITHUB_OUTPUT
          echo "DOWN_COUNT=$down" >> $GITHUB_OUTPUT

      - name: 복구 필요 여부 판단
        if: steps.verify.outputs.DOWN_COUNT > 0
        run: |
          echo "🔴 DOWN 감지: ${{ steps.verify.outputs.DOWN_COUNT }}/4"
          echo "⚠️  자동 복구 시작..."

      - name: Vercel CLI 설치
        if: steps.verify.outputs.DOWN_COUNT > 0
        run: npm install -g vercel

      - name: Vercel 재배포 (강제)
        if: steps.verify.outputs.DOWN_COUNT > 0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          echo "🔧 재배포 시작..."
          # vercel deploy --prod --token=$VERCEL_TOKEN || echo "⚠️  수동 재배포 필요"
          echo "⚠️  Vercel 계정 권한 필요 (token secrets 설정 필요)"

      - name: 복구 후 재검증
        if: steps.verify.outputs.DOWN_COUNT > 0
        run: |
          echo "⏳ 30초 대기 후 재검증..."
          sleep 30

          endpoints=(
            "https://dsc-fms-portal-audit.vercel.app"
            "https://dsc-fms-portal-discord.vercel.app"
            "https://dsc-fms-portal-bm.vercel.app"
            "https://dsc-fms-portal-travel.vercel.app"
          )

          recovered=0
          for endpoint in "${endpoints[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" --max-time 10 2>/dev/null || echo "000")
            if [[ "$code" == "200" ]]; then
              echo "✅ $endpoint → 복구됨"
              ((recovered++))
            else
              echo "❌ $endpoint → 여전히 DOWN (HTTP $code)"
            fi
          done

          if [[ $recovered -eq 4 ]]; then
            echo "🎉 자동 복구 성공! 모든 P1 엔드포인트 복구됨"
            echo "RECOVERY_STATUS=SUCCESS" >> $GITHUB_ENV
          else
            echo "🚨 자동 복구 실패. 수동 개입 필요"
            echo "RECOVERY_STATUS=FAILED" >> $GITHUB_ENV
          fi

      - name: 실패 알림 (Discord)
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          payload: |
            {
              "text": "🚨 P2 자동 복구 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Vercel 자동 복구 실패*\n\n• 상태: DOWN 지속\n• 원인: Vercel 인프라 레벨 배포 실패\n• 필요 조치: 수동 Vercel 대시보드 확인\n\n[Vercel Dashboard](https://vercel.com/dashboard)"
                  }
                }
              ]
            }

      - name: 성공 기록 (메타데이터)
        if: always()
        run: |
          cat > p2_recovery_result.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "healthy_count": ${{ steps.verify.outputs.HEALTHY_COUNT }},
            "down_count": ${{ steps.verify.outputs.DOWN_COUNT }},
            "recovery_attempted": ${{ steps.verify.outputs.DOWN_COUNT > 0 }},
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF
          cat p2_recovery_result.json

      - name: 결과 업로드 (아티팩트)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p2-recovery-result
          path: p2_recovery_result.json
          retention-days: 7
