name: P1 엔드포인트 백업 모니터링

on:
  schedule:
    - cron: '*/5 * * * *'  # 5분 주기
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: P1 Vercel 엔드포인트 헬스 체크

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: P1 엔드포인트 체크 (3회 연속 확인)
        id: check
        run: |
          endpoints=(
            "https://dsc-fms-portal-audit.vercel.app"
            "https://dsc-fms-portal-discord.vercel.app"
            "https://dsc-fms-portal-bm.vercel.app"
            "https://dsc-fms-portal-travel.vercel.app"
          )

          success_count=0
          max_checks=3

          for check in $(seq 1 $max_checks); do
            echo "📍 상태 확인 $check/$max_checks..."
            all_ok=true

            for endpoint in "${endpoints[@]}"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint" --max-time 10 2>/dev/null || echo "000")
              if [[ "$code" != "200" ]]; then
                echo "❌ $endpoint → HTTP $code"
                all_ok=false
              else
                echo "✅ $endpoint → HTTP 200"
              fi
            done

            if [[ "$all_ok" == "true" ]]; then
              ((success_count++))
              echo "✅ 확인 $check 성공 ($success_count/$max_checks)"
            else
              success_count=0
              echo "⚠️  확인 $check 실패 (카운트 리셋)"
            fi

            if [[ $success_count -eq $max_checks ]]; then
              echo "HEALTH_STATUS=HEALTHY" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 10
          done

          echo "HEALTH_STATUS=UNHEALTHY" >> $GITHUB_OUTPUT
          exit 1

      - name: 상태 저장 (메타데이터)
        if: always()
        run: |
          cat > p1_health_check_result.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "${{ steps.check.outputs.HEALTH_STATUS || 'UNKNOWN' }}",
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}"
          }
          EOF
          cat p1_health_check_result.json

      - name: 결과 업로드 (아티팩트)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1-health-check-result
          path: p1_health_check_result.json
          retention-days: 30

      - name: 실패 시 Discord 알림
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          payload: |
            {
              "text": "🔴 P1 엔드포인트 DOWN 감지",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*P1 백업 모니터링 알림*\n\n4개 P1 엔드포인트 중 일부가 다운됨\n\n• audit.vercel.app: 404\n• discord.vercel.app: 404\n• bm.vercel.app: 404\n• travel.vercel.app: 404\n\n[자동 복구 진행 중... 수동 개입 필요할 수 있음]"
                  }
                }
              ]
            }

      - name: 커밋 (결과 기록)
        if: always() && success()
        run: |
          git config user.name "P1-Health-Bot"
          git config user.email "p1-health@localhost"
          git add p1_health_check_result.json 2>/dev/null || true
          git commit -m "📊 P1 헬스 체크: 성공 ($(date '+%H:%M %Z'))" 2>/dev/null || true
          git push || true
