name: GCS Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    name: Validate GCS Commit Format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR commits
        id: pr-commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          COMMITS=$(gh pr view $PR_NUMBER --json commits --jq '.commits[].oid')
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate commit messages
        env:
          COMMITS: ${{ steps.pr-commits.outputs.commits }}
        run: |
          VIOLATIONS=0
          INVALID_COMMITS=()

          while IFS= read -r commit_hash; do
            if [[ -z "$commit_hash" ]]; then
              continue
            fi

            # Skip merge commits
            PARENTS=$(git log -1 --format=%P "$commit_hash" | wc -w)
            if [[ $PARENTS -gt 1 ]]; then
              continue
            fi

            COMMIT_MSG=$(git log -1 --format=%B "$commit_hash")
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -n1)

            # Validate header format: <type>(<scope>): <subject>
            if ! echo "$FIRST_LINE" | grep -qE '^(feat|fix|chore|docs|style|refactor|perf|test|ci|revert)\([a-z0-9\-_]+\):[[:space:]].+$'; then
              VIOLATIONS=$((VIOLATIONS + 1))
              INVALID_COMMITS+=("$commit_hash: Invalid header format")
            fi

            # Check for Refs: tag
            if ! echo "$COMMIT_MSG" | grep -q '^Refs:[[:space:]]'; then
              VIOLATIONS=$((VIOLATIONS + 1))
              INVALID_COMMITS+=("$commit_hash: Missing 'Refs:' tag")
            fi

            # Check for Stage: tag
            if ! echo "$COMMIT_MSG" | grep -qE '^Stage:[[:space:]]'; then
              VIOLATIONS=$((VIOLATIONS + 1))
              INVALID_COMMITS+=("$commit_hash: Missing 'Stage:' tag")
            fi
          done <<< "$COMMITS"

          if [[ $VIOLATIONS -gt 0 ]]; then
            echo "❌ GCS Validation Failed"
            echo ""
            printf '%s\n' "${INVALID_COMMITS[@]}"
            echo ""
            echo "GCS Standard:"
            echo "  Header: <type>(<scope>): <subject>"
            echo "  Body must include Refs: <task_id> and Stage: <DESIGN|DB|API|UI|DEPLOY|VERIFY>"
            exit 1
          else
            echo "✅ All commits are GCS compliant"
          fi

  check-ctb-update:
    runs-on: ubuntu-latest
    name: Verify CTB would be updated

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for CTB update in PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_DIFF=$(gh pr view $PR_NUMBER --json files --jq '.files[].path')

          if echo "$PR_DIFF" | grep -q "memory/active_work_tracking.md"; then
            echo "✅ CTB (active_work_tracking.md) would be updated"
          else
            echo "⚠️ Note: PR does not include CTB update"
            echo "Consider adding CTB update for commit tracking"
          fi
